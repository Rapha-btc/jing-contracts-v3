# RV-only manifest for fuzzing markets-sbtc-stx-jing.
#
# Includes a minimal set of contracts needed to drive deposit/cancel/close
# paths under random tx sequences:
#   - local SIP-010 trait
#   - two mock SIP-010 token contracts (fake transfer, lies about balance)
#   - mock-jing-core (stub log-* functions, all return ok true)
#   - markets-sbtc-stx-jing (built from production source with use-trait
#     and .jing-core references rewritten to local mocks; see tests/rv/build.sh)
#
# Run:
#   bash tests/rv/build.sh markets-sbtc-stx-jing
#   npx rv . markets-sbtc-stx-jing invariant --runs=200
[project]
name = "jing-contracts-v3-rv-usdcx"
description = "RV-only manifest for fuzzing markets-sbtc-stx-jing"
authors = []
telemetry = false
cache_dir = "./.cache"

# Pyth contracts referenced in market's settle path. RV won't call settle
# (Pyth traits have no impls) but the contract must type-check.
[[project.requirements]]
contract_id = "SP1CGXWEAMG6P6FT04W66NVGJ7PQWMDAC19R7PJ0Y.pyth-traits-v2"

[[project.requirements]]
contract_id = "SP1CGXWEAMG6P6FT04W66NVGJ7PQWMDAC19R7PJ0Y.wormhole-traits-v2"

[[project.requirements]]
contract_id = "SP1CGXWEAMG6P6FT04W66NVGJ7PQWMDAC19R7PJ0Y.pyth-storage-v4"

[[project.requirements]]
contract_id = "SP1CGXWEAMG6P6FT04W66NVGJ7PQWMDAC19R7PJ0Y.pyth-oracle-v4"

[repl.remote_data]
enabled = true
api_url = 'https://api.hiro.so'

[repl.analysis]
passes = []
check_checker = { trusted_sender = false, trusted_caller = false, callee_filter = false }

# Order matters for the simnet deploy plan: traits, then mocks, then SUT.

[contracts.sip-010-trait]
path = "tests/rv/sip-010-trait.clar"
clarity_version = 5
epoch = "3.4"

# Single mock token used for both token-x and token-y bindings. Using one
# contract instead of two means RV's random principal-pick from the
# SIP-010 impl pool always matches the market's token-x/token-y check, so
# deposit-token-{x,y} calls don't get rejected by ERR_WRONG_TRAIT 50% of
# the time.
[contracts.mock-ft]
path = "tests/rv/mock-ft.clar"
clarity_version = 5
epoch = "3.4"

[contracts.mock-jing-core]
path = "tests/rv/mock-jing-core.clar"
clarity_version = 5
epoch = "3.4"

[contracts.markets-sbtc-stx-jing]
path = "tests/rv/.build/markets-sbtc-stx-jing.clar"
clarity_version = 5
epoch = "3.4"
